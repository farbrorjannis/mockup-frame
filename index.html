<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-color: #fcf9f3;
            --card-bg: #ffffff;
            --accent: #5d4a3e;
            --accent-light: #f1ede4;
            --text: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            text-align: center;
        }

        .header {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        #canvas-container {
            width: 100%;
            background: #e5e5e5;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            aspect-ratio: 4/3;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            border: 1px dashed #ccc;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px;
        }

        button, .upload-btn {
            background: var(--accent-light);
            color: var(--accent);
            border: none;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }

        button:hover { background: #e8e2d5; }
        .primary { background: var(--accent); color: white; }
        .primary:hover { background: #4a3b32; }

        #file-input { display: none; }
        
        .instruction {
            color: #888;
            font-size: 14px;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">🖼️ Instant Social Mockup</div>
    
    <div id="canvas-container">
        <canvas id="mockupCanvas"></canvas>
        <div id="placeholder" class="instruction">Upload your artwork to see it on the wall</div>
    </div>

    <div class="controls">
        <label for="file-input" class="upload-btn primary">1. Upload Image</label>
        <input type="file" id="file-input" accept="image/*">
        
        <button onclick="changeFrame('oak')">Oak Frame</button>
        <button onclick="changeFrame('black')">Black Frame</button>
        <button onclick="changeFrame('white')">White Frame</button>
        <button id="downloadBtn" class="primary" style="display:none">Download PNG</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('mockupCanvas');
    const ctx = canvas.getContext('2d');
    const fileInput = document.getElementById('file-input');
    const placeholder = document.getElementById('placeholder');
    const downloadBtn = document.getElementById('downloadBtn');

    let userImg = new Image();
    let currentFrameColor = '#8d6e63'; // Initial Oak

    fileInput.onchange = (e) => {
    // FIX: Kontrollera att det faktiskt finns en vald fil innan vi fortsätter
    if (!e.target.files || e.target.files.length === 0) {
        return; 
    }

    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = (event) => {
        userImg.onload = () => {
            placeholder.style.display = 'none';
            downloadBtn.style.display = 'block';
            drawMockup();
        };
        userImg.src = event.target.result;
    };
    
    // Här skickar vi nu in den specifika filen 'file'
    reader.readAsDataURL(file);
};


    function changeFrame(type) {
        if (type === 'oak') currentFrameColor = '#8d6e63';
        if (type === 'black') currentFrameColor = '#1a1a1a';
        if (type === 'white') currentFrameColor = '#f0f0f0';
        if (userImg.src) drawMockup();
    }

    function drawMockup() {
        // High resolution scene size
        const sceneW = 1600;
        const sceneH = 1200;
        canvas.width = sceneW;
        canvas.height = sceneH;

        // 1. Draw the Wall (Background)
        ctx.fillStyle = '#f5f2eb';
        ctx.fillRect(0, 0, sceneW, sceneH);

        // 2. Calculate measurements based on uploaded art
        const padding = 250;
        const maxArtW = sceneW - padding * 2;
        const maxArtH = sceneH - padding * 2;
        
        let ratio = Math.min(maxArtW / userImg.width, maxArtH / userImg.height);
        let artW = userImg.width * ratio;
        let artH = userImg.height * ratio;

        let x = (sceneW - artW) / 2;
        let y = (sceneH - artH) / 2;

        // 3. Drop Shadow for the frame
        ctx.shadowColor = 'rgba(0,0,0,0.25)';
        ctx.shadowBlur = 40;
        ctx.shadowOffsetX = 15;
        ctx.shadowOffsetY = 20;

        // 4. Dynamic Frame
        const frameStroke = 30;
        const matting = 50; // Passepartout

        ctx.fillStyle = currentFrameColor;
        // Frame outer border
        ctx.fillRect(x - frameStroke - matting, y - frameStroke - matting, 
                     artW + (frameStroke + matting) * 2, artH + (frameStroke + matting) * 2);

        // 5. White Matting (Passepartout)
        ctx.shadowBlur = 0; // Turn off shadow for inner parts
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 0;
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(x - matting, y - matting, artW + matting * 2, artH + matting * 2);

        // 6. Draw the Artwork
        ctx.drawImage(userImg, x, y, artW, artH);
        
        // 7. Subtle inner shadow on art for depth
        ctx.strokeStyle = 'rgba(0,0,0,0.1)';
        ctx.lineWidth = 1;
        ctx.strokeRect(x, y, artW, artH);
    }

    downloadBtn.onclick = () => {
        const link = document.createElement('a');
        link.download = 'artist-mockup-export.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    };
</script>

</body>
</html>
